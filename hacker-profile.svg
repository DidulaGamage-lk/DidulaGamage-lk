<svg width="900" height="430" viewBox="0 0 900 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020403"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <linearGradient id="termTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101913"/>
      <stop offset="100%" stop-color="#0a0f0c"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="frame">
      <rect x="0" y="0" width="900" height="430" rx="10"/>
    </clipPath>

    <clipPath id="type1"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" from="0" to="230" begin="0.4s" dur="0.9s" fill="freeze" calcMode="discrete"/></rect></clipPath>
    <clipPath id="type2"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" from="0" to="430" begin="1.6s" dur="1.1s" fill="freeze" calcMode="discrete"/></rect></clipPath>
    <clipPath id="type3"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" from="0" to="330" begin="3.0s" dur="1.0s" fill="freeze" calcMode="discrete"/></rect></clipPath>
    <clipPath id="type4"><rect x="0" y="0" width="0" height="24"><animate attributeName="width" from="0" to="470" begin="4.3s" dur="1.2s" fill="freeze" calcMode="discrete"/></rect></clipPath>
  </defs>

  <style>
    .mono { font-family: 'Courier New', ui-monospace, monospace; }
    .rain { fill: #0f0; opacity: 0.55; font-size: 15px; }
    .prompt { fill: #3ddc55; }
    .txt { fill: #d6ffe0; }
    .dim { fill: #5f8f6a; }
    .accent { fill: #58ff9d; }
    .title { fill: #7CFFB2; font-weight: bold; }
    @keyframes blink { 0%, 45% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .cursor { animation: blink 1s steps(1) infinite; }
    @keyframes flicker {
      0%, 92%, 100% { opacity: 1; }
      93% { opacity: 0.82; }
      95% { opacity: 0.6; }
      96% { opacity: 0.95; }
    }
    .screen { animation: flicker 6s infinite; }
  </style>

  <g clip-path="url(#frame)">
    <rect width="900" height="430" fill="url(#bg)"/>

    <!-- matrix rain columns -->
    <g class="rain mono">
      <text x="18" y="0"><animate attributeName="y" from="-400" to="450" dur="5.5s" begin="0s" repeatCount="indefinite"/>ﾊ十ﾐ0x2F53ﾆ7Aｹ</text>
      <text x="46" y="0"><animate attributeName="y" from="-400" to="450" dur="7.2s" begin="0.6s" repeatCount="indefinite"/>101101ｦｳﾎ9Zｵ</text>
      <text x="74" y="0"><animate attributeName="y" from="-400" to="450" dur="4.8s" begin="1.1s" repeatCount="indefinite"/>ﾜｸﾂ4C8xF3ｱｦ</text>
      <text x="102" y="0"><animate attributeName="y" from="-400" to="450" dur="6.4s" begin="0.3s" repeatCount="indefinite"/>ｹ0110ﾒｦﾋAｩ9</text>
      <text x="130" y="0"><animate attributeName="y" from="-400" to="450" dur="5.1s" begin="1.8s" repeatCount="indefinite"/>ﾆﾈｦ7B9xEｱ0</text>
      <text x="158" y="0"><animate attributeName="y" from="-400" to="450" dur="6.9s" begin="0.9s" repeatCount="indefinite"/>ｵｦﾂ3F1x9Aｩ</text>
      <text x="740" y="0"><animate attributeName="y" from="-400" to="450" dur="6.1s" begin="0.4s" repeatCount="indefinite"/>ｦﾎ8C0xE1ｱｹ</text>
      <text x="768" y="0"><animate attributeName="y" from="-400" to="450" dur="5.3s" begin="1.4s" repeatCount="indefinite"/>101ｦﾒ4Aｵ9x</text>
      <text x="796" y="0"><animate attributeName="y" from="-400" to="450" dur="7.6s" begin="0.2s" repeatCount="indefinite"/>ﾊｸﾋ0F7xC3ｩ</text>
      <text x="824" y="0"><animate attributeName="y" from="-400" to="450" dur="4.9s" begin="1.6s" repeatCount="indefinite"/>ｦ011ﾆB9xE1</text>
      <text x="852" y="0"><animate attributeName="y" from="-400" to="450" dur="6.6s" begin="0.7s" repeatCount="indefinite"/>ﾜｩﾎ3C7xA9ｵ</text>
      <text x="880" y="0"><animate attributeName="y" from="-400" to="450" dur="5.7s" begin="1.2s" repeatCount="indefinite"/>ｦｸ101ﾒF0x</text>
    </g>

    <!-- scanline overlay -->
    <g opacity="0.08">
      <rect width="900" height="2" y="0" fill="#00ff66">
        <animate attributeName="y" from="0" to="430" dur="3.2s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- terminal window -->
    <g class="screen">
      <rect x="60" y="60" width="780" height="310" rx="10" fill="#040706" stroke="#1c3d27" stroke-width="1.5"/>
      <rect x="60" y="60" width="780" height="34" rx="10" fill="url(#termTop)" stroke="#1c3d27" stroke-width="1.5"/>
      <rect x="60" y="82" width="780" height="12" fill="url(#termTop)"/>

      <circle cx="84" cy="77" r="6" fill="#ff5f57"/>
      <circle cx="104" cy="77" r="6" fill="#febc2e"/>
      <circle cx="124" cy="77" r="6" fill="#28c840"/>
      <text x="450" y="82" text-anchor="middle" class="mono dim" font-size="13">root@didula: ~/profile</text>

      <!-- typed content -->
      <g class="mono" font-size="17" filter="url(#glow)">
        <text x="90" y="135" class="title" font-size="21">DIDULA GAMAGE</text>
        <text x="90" y="160" class="dim" font-size="13">// developer · designer · aspiring ethical hacker</text>

        <text x="90" y="200" class="prompt">$</text>
        <g clip-path="url(#type1)">
          <text x="112" y="200" class="txt">whoami</text>
        </g>

        <text x="90" y="228" class="prompt">$</text>
        <g clip-path="url(#type2)">
          <text x="112" y="228" class="accent">Full-stack dev · UI/UX designer · Sri Lanka 🇱🇰</text>
        </g>

        <text x="90" y="256" class="prompt">$</text>
        <g clip-path="url(#type3)">
          <text x="112" y="256" class="txt">scan --skills --target=self</text>
        </g>

        <text x="90" y="284" class="prompt">$</text>
        <g clip-path="url(#type4)">
          <text x="112" y="284" class="accent">[OK] JS · PHP · Kali Linux · Figma · Git</text>
        </g>

        <text x="90" y="322" class="prompt">root@didula:~$</text>
        <rect x="242" y="308" width="10" height="18" class="cursor" fill="#3ddc55"/>
      </g>
    </g>

    <text x="450" y="410" text-anchor="middle" class="mono dim" font-size="12">connect · didulagamage.pages.dev</text>
  </g>

  <rect x="1" y="1" width="898" height="428" rx="10" fill="none" stroke="#123c22" stroke-width="1"/>
</svg>
